name: 🎬 Manhwa Recap Generator

on:
  # Auto-trigger when you push a new chapters config
  push:
    paths:
      - 'chapters.txt'
  # Manual trigger from Actions tab — you pick chapter range
  workflow_dispatch:
    inputs:
      chapters:
        description: 'Chapter range (e.g. 1-10 or 11-20)'
        required: true
        default: '1-10'
      scenes:
        description: 'Number of scenes to generate'
        required: false
        default: '10'

jobs:
  generate-recap:
    runs-on: ubuntu-latest
    timeout-minutes: 90        # Ken Burns + TTS can be slow, give it room

    steps:

      # ── 1. Checkout ────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. System deps ─────────────────────────────────────────
      - name: 🔧 Install FFmpeg and fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-dejavu-core \
            fonts-liberation \
            --no-install-recommends

      # ── 4. Python deps ─────────────────────────────────────────
      - name: 📦 Install Python packages
        run: pip install -r requirements.txt

      # ── 5. Resolve chapter range ───────────────────────────────
      - name: 📋 Resolve chapter range
        id: chapters
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHAPTERS="${{ github.event.inputs.chapters }}"
            SCENES="${{ github.event.inputs.scenes }}"
          elif [ -f chapters.txt ]; then
            # Read from chapters.txt (first non-empty line)
            CHAPTERS=$(grep -v '^#' chapters.txt | grep -v '^$' | head -1 | tr -d ' ')
            SCENES=$(grep -v '^#' chapters.txt | grep -v '^$' | sed -n '2p' | tr -d ' ')
            SCENES=${SCENES:-10}
          else
            CHAPTERS="1-10"
            SCENES="10"
          fi
          echo "chapters=$CHAPTERS" >> $GITHUB_OUTPUT
          echo "scenes=$SCENES"     >> $GITHUB_OUTPUT
          echo "Using chapters: $CHAPTERS | scenes: $SCENES"

      # ── 6. Run pipeline ────────────────────────────────────────
      - name: 🎬 Generate recap video
        env:
          KEY1:    ${{ secrets.KEY1 }}
          KEY2:    ${{ secrets.KEY2 }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          USER_ID:  ${{ secrets.USER_ID }}
        run: |
          python recap_pipeline.py \
            --chapters "${{ steps.chapters.outputs.chapters }}" \
            --scenes   "${{ steps.chapters.outputs.scenes }}"

      # ── 7. Show generated script (for debugging) ───────────────
      - name: 📄 Show generated script
        if: always()
        run: |
          if [ -f workspace/generated_script.json ]; then
            echo "=== GENERATED SCRIPT ==="
            cat workspace/generated_script.json
          fi

      # ── 8. Upload video artifact ───────────────────────────────
      - name: 📤 Upload video
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: recap-ch${{ steps.chapters.outputs.chapters }}-run${{ github.run_number }}
          path: output/*.mp4
          retention-days: 14

      # ── 9. Commit output to repo (optional) ───────────────────
      - name: 💾 Commit output video
        if: success()
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.mp4 workspace/generated_script.json || true
          git diff --cached --quiet || \
            git commit -m "🎬 Solo Leveling Ch.${{ steps.chapters.outputs.chapters }} recap [run #${{ github.run_number }}]"
          git push || true

      # ── 10. Telegram — success ─────────────────────────────────
      - name: 📱 Telegram — success
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          USER_ID:  ${{ secrets.USER_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${USER_ID}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>Solo Leveling Ch.${{ steps.chapters.outputs.chapters }}</b> done!%0A🎬 Download from: ${RUN_URL}" \
            || true

      # ── 11. Telegram — failure ─────────────────────────────────
      - name: 📱 Telegram — failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          USER_ID:  ${{ secrets.USER_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${USER_ID}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>Recap failed</b> Ch.${{ steps.chapters.outputs.chapters }}%0ALogs: ${RUN_URL}" \
            || true
