name: 🎬 Manhwa Recap Generator

on:
  push:
    paths:
      - 'chapters.txt'
  workflow_dispatch:
    inputs:
      chapters:
        description: 'Chapter range e.g. 1-10'
        required: true
        default: '1-10'
      scenes:
        description: 'Number of scenes (10-15 recommended)'
        required: false
        default: '10'
      format:
        description: 'Video format'
        required: false
        default: 'reels'
        type: choice
        options:
          - reels      # 1080x1920 — Instagram/Facebook/TikTok
          - youtube    # 1280x720  — YouTube

# ── FIX: Allow workflow to push commits back to repo ──────────────
permissions:
  contents: write

jobs:
  generate-recap:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🔧 Install FFmpeg + espeak-ng + fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            espeak-ng \
            fonts-dejavu-core \
            --no-install-recommends

      - name: 📦 Install Python packages
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📋 Resolve config
        id: cfg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHAPTERS="${{ github.event.inputs.chapters }}"
            SCENES="${{ github.event.inputs.scenes }}"
            FORMAT="${{ github.event.inputs.format }}"
          elif [ -f chapters.txt ]; then
            CHAPTERS=$(grep -v '^#' chapters.txt | grep -v '^$' | sed -n '1p' | tr -d ' ')
            SCENES=$(grep -v '^#' chapters.txt | grep -v '^$' | sed -n '2p' | tr -d ' ')
            FORMAT=$(grep -v '^#' chapters.txt | grep -v '^$' | sed -n '3p' | tr -d ' ')
            SCENES=${SCENES:-10}
            FORMAT=${FORMAT:-reels}
          else
            CHAPTERS="1-10"; SCENES="10"; FORMAT="reels"
          fi
          echo "chapters=$CHAPTERS" >> $GITHUB_OUTPUT
          echo "scenes=$SCENES"     >> $GITHUB_OUTPUT
          echo "format=$FORMAT"     >> $GITHUB_OUTPUT
          echo "▶  Chapters=$CHAPTERS | Scenes=$SCENES | Format=$FORMAT"

      - name: 🎬 Run pipeline
        env:
          KEY1:         ${{ secrets.KEY1 }}
          KEY2:         ${{ secrets.KEY2 }}
          GEMINI_API_KEY: ${{ secrets.KEY1 }}
          GROQ_API_KEY: ${{ secrets.GROQ_KEY }}
          TG_TOKEN:     ${{ secrets.TG_TOKEN }}
          USER_ID:      ${{ secrets.USER_ID }}
        run: |
          python recap_pipeline.py \
            --chapters "${{ steps.cfg.outputs.chapters }}" \
            --scenes   "${{ steps.cfg.outputs.scenes }}"   \
            --format   "${{ steps.cfg.outputs.format }}"

      - name: 📄 Show generated script
        if: always()
        run: cat workspace/generated_script.json 2>/dev/null || echo "No script generated"

      - name: 📤 Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: recap-ch${{ steps.cfg.outputs.chapters }}-${{ steps.cfg.outputs.format }}-run${{ github.run_number }}
          path: output/*.mp4
          retention-days: 14

      - name: 💾 Commit output
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.mp4 workspace/generated_script.json 2>/dev/null || true
          git diff --cached --quiet || \
            git commit -m "🎬 Solo Leveling Ch.${{ steps.cfg.outputs.chapters }} [${{ steps.cfg.outputs.format }}] [run #${{ github.run_number }}]"
          git push

      - name: 📱 Telegram — success
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          USER_ID:  ${{ secrets.USER_ID }}
        run: |
          URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${USER_ID}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>Solo Leveling Ch.${{ steps.cfg.outputs.chapters }}</b> done!%0A📐 Format: ${{ steps.cfg.outputs.format }}%0A🎬 Download: ${URL}" || true

      - name: 📱 Telegram — failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          USER_ID:  ${{ secrets.USER_ID }}
        run: |
          URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${USER_ID}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>Failed</b> Ch.${{ steps.cfg.outputs.chapters }}%0ALogs: ${URL}" || true
